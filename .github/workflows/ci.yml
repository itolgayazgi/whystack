name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A CI nobody waits for is a CI nobody trusts. Superseded runs on the same branch are cancelled
# rather than queued behind work that is already obsolete.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege. Nothing here needs to write to the repository, and a workflow triggered by a
# fork's pull request must never be able to.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------------------------
  # JavaScript / TypeScript: the client and the shared packages.
  # ---------------------------------------------------------------------------------------------
  web:
    name: Client & packages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # --frozen-lockfile is the point of this step: it fails if pnpm-lock.yaml does not match
      # package.json. Without it, a dependency added but never locked would install fine here and
      # break for the next person — the classic "works on my machine".
      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint and format
        run: pnpm lint

      # Enforces CLAUDE.md 1.8: design values come from packages/theme, never from a literal.
      # This is the rule we lost by choosing Biome over eslint-plugin-react-native, replaced with
      # a check that actually knows where a colour is allowed to live.
      - name: No hardcoded design values
        run: pnpm lint:design

      - name: Typecheck
        run: pnpm typecheck

      # Includes the WCAG AA contrast audit — 96 token pairs. This is the whole reason that audit
      # was written as a test rather than a one-off script: a colour change now fails here, loudly,
      # instead of shipping.
      - name: Test
        run: pnpm test

      # Builds the client's web bundle AND the static site. The site's build ends by verifying its own
      # output ships zero JavaScript — ADR-0009 promises a reader who came to read will not download an
      # application, and a promise about bytes has to be measured.
      - name: Build
        run: pnpm build

  # ---------------------------------------------------------------------------------------------
  # .NET: the API.
  # ---------------------------------------------------------------------------------------------
  api:
    name: API
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # NOT a secret, and deliberately not stored as one. This database is created for this job,
      # lives on the runner's private network, holds no data, and is destroyed minutes later.
      # Putting it in GitHub Secrets would only mean pull requests from forks could not run the
      # tests — trading real coverage for imaginary security. Do not reuse this value anywhere.
      MSSQL_SA_PASSWORD: 'CiEphemeral_NotASecret_1!'
      ConnectionStrings__WhyStackDatabase: 'Server=127.0.0.1,1433;Database=WhyStack;User Id=sa;Password=CiEphemeral_NotASecret_1!;Encrypt=True;TrustServerCertificate=True'

    services:
      # A real SQL Server, not an in-memory provider. An in-memory provider would happily accept a
      # migration SQL Server rejects, and a health check against it would prove nothing.
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_PID: Developer
          MSSQL_SA_PASSWORD: 'CiEphemeral_NotASecret_1!'
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'CiEphemeral_NotASecret_1!' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 20s

    steps:
      - uses: actions/checkout@v5

      # global.json pins the SDK, so CI compiles with the same toolchain as the developer machine
      # rather than whatever the runner image happens to ship this week.
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore apps/api/WhyStack.sln

      - name: Format
        run: dotnet format apps/api/WhyStack.sln --verify-no-changes --no-restore

      # Directory.Build.props sets TreatWarningsAsErrors, so a warning fails the build here.
      # --no-restore proves restore actually succeeded above rather than silently re-running.
      - name: Build
        run: dotnet build apps/api/WhyStack.sln --configuration Release --no-restore

      # Migration validation (13-quality-assurance.md — "Clean database creation").
      # The database here is empty, so this proves the migrations apply from nothing. A migration
      # that only works against a database that already has the previous schema is a migration that
      # will fail on the first fresh environment — usually production.
      - name: Apply migrations to a clean database
        working-directory: apps/api
        run: |
          dotnet tool restore
          dotnet dotnet-ef database update \
            --project src/WhyStack.Infrastructure \
            --startup-project src/WhyStack.Api

      # Includes the readiness check hitting the SQL Server service container above.
      - name: Test
        run: dotnet test apps/api/WhyStack.sln --configuration Release --no-build --verbosity normal
