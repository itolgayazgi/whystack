name: CodeQL

# Static security analysis (13-quality-assurance.md — "Security scanning").
#
# Kept out of ci.yml, and deliberately NOT a required merge check: it takes minutes, and a slow
# required gate is one people learn to route around. Findings surface in the Security tab and as
# annotations on the pull request, where they are read rather than waited on. If a real
# vulnerability class starts slipping through, promote it to a required check then — with reason.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Advisories land after code is written. A weekly re-scan catches a vulnerability that was not
    # known to be one on the day the code merged.
    - cron: '0 6 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  analyse:
    name: Analyse ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - uses: actions/checkout@v5

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
