packages:
  - "apps/client"
  - "apps/site"
  - "packages/*"

  # Cross-cutting test suites (`06` § Tests Directory). Only the ones with a package.json become
  # workspace members — tests/e2e is Maestro YAML and stays out of pnpm's way.
  - "tests/*"

# A single version for anything more than one workspace depends on. Packages reference these as
# "catalog:" instead of a version range, so a second copy of TypeScript cannot drift in — which it did:
# apps/client was on 6.x and everything else on 5.x, and the day a new package shifted which one pnpm
# hoisted, tsc vanished from two packages that had not been touched.
catalog:
  typescript: ~6.0.3
  vitest: ^3.2.7

  # Reads `topic.yaml` and the terminology dictionary. The repository's first runtime dependency, and it
  # earns it: the alternative was JSON, and a metadata file nobody can put a comment in is a metadata
  # file whose decisions are unexplainable. `yaml` has no transitive dependencies of its own.
  yaml: ^2.8.1

# pnpm blocks dependency install scripts by default — postinstall is the classic supply-chain
# entry point. Every entry here is an explicit decision to let that package run code on install.
allowBuilds:
  # Vitest's bundler. Its install script places the platform-native binary; it cannot run without it.
  esbuild: true
  # Astro's image pipeline. Its install script fetches the platform-native libvips binding.
  sharp: true

# Forced resolutions for transitive dependencies we do not control.
# Each one must say what it fixes and when it can be removed — an override with no expiry becomes
# a permanent, unexplained pin that nobody dares touch.
overrides:
  # GHSA: missing buffer bounds check in uuid v3/v5/v6 when `buf` is supplied. Reaches us only via
  # xcode@3.0.1 <- @expo/config-plugins, which calls uuid.v4() and nothing else — so the vulnerable
  # path is unreachable here. Pinned anyway rather than dismissed: an unresolved advisory trains
  # people to ignore the next one. Remove once Expo's config-plugins ships a patched xcode.
  uuid: '>=11.1.1'

  # GHSA: esbuild's dev server allows arbitrary file read on Windows. Only 0.27.3–0.28.0 are affected,
  # so the override is scoped to that range rather than forcing every esbuild in the tree — 0.25.x is
  # also present, is NOT affected, and dragging it forward two minors would be a breakage we chose for
  # no benefit. An override should be as narrow as the advisory.
  'esbuild@>=0.27.3 <0.28.1': '>=0.28.1'

# Metro (React Native's bundler) cannot resolve pnpm's symlinked node_modules.
# Hoisting the dependency tree is the documented Expo + pnpm workaround (ADR-0007, ADR-0016).
nodeLinker: hoisted
