# Local development database. Not a deployment artefact — production infrastructure is a separate
# concern and a later sprint.
#
# Start it with scripts/setup/dev-database.ps1 (or .sh) rather than by hand: the script generates the
# password, writes it here and into the API's user secrets, so the two cannot drift apart.

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: whystack-sqlserver
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_PID: Developer
      # No default on purpose. If .env is missing, compose fails here with this message instead of
      # silently starting a database with a password somebody guessed once and never changed.
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?run scripts/setup/dev-database.ps1 — it creates .env}
    ports:
      # Bound to localhost only. Without the 127.0.0.1 prefix, Docker publishes on 0.0.0.0 and the
      # database is reachable from the network you are sitting on — including a coffee-shop wifi.
      - '127.0.0.1:1433:1433'
    volumes:
      - whystack-sqlserver-data:/var/opt/mssql
    healthcheck:
      # "The container is running" is not the same as "SQL Server accepts connections". SQL Server
      # takes tens of seconds to become usable, and the setup script waits on this, not on the port.
      test:
        [
          'CMD-SHELL',
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

volumes:
  whystack-sqlserver-data:
    name: whystack-sqlserver-data
